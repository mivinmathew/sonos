<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mivin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }
    
    button, a {
      width: 200px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid #e5e5e5;
      cursor: default;
      background: #f5f5f5;
      color: #999;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: all 0.2s;
    }
    
    a#sonos {
      background: #1a1a1a;
      color: #ffffff;
      border: 1px solid #1a1a1a;
      opacity: 1;
      cursor: pointer;
      font-weight: 500;
    }
    
    a#sonos:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <button>unavailable</button>
    <button>unavailable</button>
    <a id="sonos" href="/sonos">The Sonos</a>
    <button>unavailable</button>
    <button>unavailablen</button>
  </div>
</body>
</html>
