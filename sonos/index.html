<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sonos</title>
  <meta name="description" content="A comic by Mivin Mathew">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'EB Garamond', Georgia, serif;
    }

    .comic-container {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 100%;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .page.loaded {
      opacity: 1;
    }

    .page object {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }

    /* Header */
    .header {
      width: 100%;
      max-width: 620px;
      padding: 3rem 1.5rem 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .header .byline {
      font-size: 1rem;
      font-style: italic;
      color: #666;
      letter-spacing: 0.02em;
    }

    /* Footer */
    .footer {
      width: 100%;
      max-width: 620px;
      padding: 3rem 1.5rem 4rem;
      text-align: center;
    }

    .footer p {
      font-size: 0.9rem;
      color: #999;
      letter-spacing: 0.02em;
    }

    .footer a {
      color: #666;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: color 0.2s, border-color 0.2s;
    }

    .footer a:hover {
      color: #1a1a1a;
      border-color: #1a1a1a;
    }

    /* Loading placeholder */
    .page-placeholder {
      width: 100%;
      aspect-ratio: 149 / 211;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #ddd;
      border-top-color: #999;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Mobile: full bleed */
    @media (max-width: 640px) {
      .header {
        padding: 2rem 1.2rem 1.5rem;
      }

      .header h1 {
        font-size: 1.4rem;
      }

      .footer {
        padding: 2rem 1.2rem 3rem;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>The Sonos</h1>
    <p class="byline"> _ mivin</p>
  </header>

  <main class="comic-container" id="comic">
  </main>

  <section style="width:100%;max-width:620px;padding:2.5rem 1.5rem;text-align:center;border-top:1px solid #e5e5e5;">
  <p style="font-size:1.1rem;font-style:italic;color:#666;margin-bottom:1.2rem;font-family:'EB Garamond',Georgia,serif;">If the Sonos moved you - I'd love to hear why.</p>
  <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
    <a href="https://mivin.substack.com/p/YOUR_POST_SLUG" target="_blank" style="font-size:0.95rem;color:#1a1a1a;text-decoration:none;border:1px solid #ccc;border-radius:6px;padding:10px 20px;">Leave a comment &rarr;</a>
    <a href="https://mivin.substack.com/subscribe" target="_blank" style="font-size:0.95rem;color:#666;text-decoration:none;border:1px solid #e5e5e5;border-radius:6px;padding:10px 20px;">Subscribe</a>
  </div>
</section>

  <footer class="footer">
    <p>&copy; Mivin Mathew · <a href="https://mivinmathew.com">mivinmathew.com</a></p>
  </footer>

  <script>
    const TOTAL_PAGES = 19;
    const comic = document.getElementById('comic');

    for (let i = 1; i <= TOTAL_PAGES; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'page';

      const placeholder = document.createElement('div');
      placeholder.className = 'page-placeholder';
      placeholder.innerHTML = '<div class="spinner"></div>';
      wrapper.appendChild(placeholder);

      const obj = document.createElement('object');
      obj.type = 'image/svg+xml';
      obj.data = `../substackv5/s${i}.svg`;
      obj.style.cssText = 'width:100%;aspect-ratio:149/211;display:block;';

      obj.addEventListener('load', () => {
        placeholder.remove();
        wrapper.classList.add('loaded');
      });

      obj.addEventListener('error', () => {
        placeholder.innerHTML = `<span style="color:#999;font-family:sans-serif;font-size:0.8rem;">Page ${i} failed to load</span>`;
      });

      wrapper.appendChild(obj);
      comic.appendChild(wrapper);
    }
  </script>

</body>
</html>
